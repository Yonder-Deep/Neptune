syntax = "proto3";

package neptune;

// ============================================================================
// Log Entry Message
// ============================================================================

// A single log entry from the embedded system
message LogEntry {
    int64 timestamp_ms = 1;     // Milliseconds since epoch
    string source = 2;          // MAIN, CTRL, NAV, WSKT, etc.
    string level = 3;           // DEBUG, INFO, WARN, ERROR, CRITICAL
    string message = 4;         // The actual log message
}

// ============================================================================
// Envelope: Top-level wrapper for all messages
// ============================================================================

// Universal message envelope that wraps any payload type.
// All WebSocket messages between base and embedded system use this format.
//
// USAGE:
//   1. Create the payload message (LogEntry, Telemetry, Command, etc.)
//   2. Serialize it to bytes using payload_message.SerializeAsString()
//   3. Create an Envelope, set type, payload, and timestamp
//   4. Serialize and send the Envelope over WebSocket
//
// EXPANDING THIS:
//   To add new message types:
//   1. Define a new proto message (e.g., message Telemetry { ... })
//   2. Add a new enum value to MessageType (e.g., TELEMETRY = 2)
//   3. Update deserialization code to handle the new type
//   4. Update the outbound queue routing to know about new types
//
message Envelope {
    enum MessageType {
        UNKNOWN = 0;
        LOG = 1;                // payload: LogEntry
        // TELEMETRY = 2;       // Future: payload: Telemetry (vehicle state, sensors)
        // COMMAND = 3;         // Future: payload: Command (base → embedded)
        // COMMAND_RESPONSE = 4; // Future: payload: CommandResponse
        // CONFIG = 5;          // Future: payload: Config
    }

    MessageType type = 1;
    bytes payload = 2;          // Serialized inner message (depends on type)
    int64 timestamp_ms = 3;     // When this message was created
    string source = 4;          // "neptune" or "base_station" for debugging
}

